<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureFits</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:30px;
}

.container{
width:100%;
max-width:1200px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
padding:30px;
box-shadow:0 8px 32px rgba(0,0,0,.3);
}

h1{
color:white;
margin-bottom:20px;
}

label{
display:block;
color:white;
margin-top:15px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.1);
color:white;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
font-size:16px;
background:#38bdf8;
color:white;
}

.preview{
display:flex;
justify-content:center;
align-items:center;
height:600px;
}

.avatar{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
transition:.5s;
}

.head{
width:80px;
height:80px;
border-radius:50%;
background:#f4c7a1;
}

.body{
margin-top:5px;
border-radius:20px;
background:#60a5fa;
}

.leg-container{
display:flex;
gap:15px;
}

.leg{
background:#334155;
border-radius:20px;
}

.info{
color:white;
margin-top:20px;
text-align:center;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<div class="container">

<div class="glass">

<h1>FutureFits</h1>

<label>Nome</label>
<input id="nome">

<label>Gênero</label>
<select id="genero">
<option value="homem">Homem</option>
<option value="mulher">Mulher</option>
</select>

<label>Altura (cm)</label>
<input id="altura" type="number">

<label>Peso (kg)</label>
<input id="peso" type="number">

<label>Ombros (cm)</label>
<input id="ombros" type="number">

<label>Cintura (cm)</label>
<input id="cintura" type="number">

<label>Quadril (cm)</label>
<input id="quadril" type="number">

<button onclick="gerarAvatar()">
Gerar Avatar
</button>

</div>

<div class="glass preview">

<div>

<div class="avatar" id="avatar">

<div class="head"></div>

<div class="body" id="body"></div>

<div class="leg-container">
<div class="leg" id="leg1"></div>
<div class="leg" id="leg2"></div>
</div>

</div>

<div class="info" id="info">
Preencha os dados e clique em gerar.
</div>

</div>

</div>

</div>

<script>

function gerarAvatar(){

const genero =
document.getElementById('genero').value;

const altura =
Number(document.getElementById('altura').value);

const peso =
Number(document.getElementById('peso').value);

const ombros =
Number(document.getElementById('ombros').value);

const cintura =
Number(document.getElementById('cintura').value);

const quadril =
Number(document.getElementById('quadril').value);

const body =
document.getElementById('body');

const leg1 =
document.getElementById('leg1');

const leg2 =
document.getElementById('leg2');

const escala =
altura/170;

let largura = ombros;

if(genero==="mulher"){
largura = quadril;
body.style.background="#f472b6";
}else{
body.style.background="#60a5fa";
}

body.style.width =
(Math.max(largura,40)*2)+"px";

body.style.height =
(180*escala)+"px";

leg1.style.width="35px";
leg2.style.width="35px";

leg1.style.height=
(120*escala)+"px";

leg2.style.height=
(120*escala)+"px";

document.getElementById('info').innerHTML=
`
${genero.toUpperCase()}<br>
${altura} cm<br>
${peso} kg<br>
Ombros: ${ombros} cm<br>
Cintura: ${cintura} cm<br>
Quadril: ${quadril} cm
`;

}

</script>

</body>
</html>
