<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureFits</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
}

canvas{
    display:block;
}

#logo{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:30px;
    font-family:Arial;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="logo">FutureFits</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.166.1/build/three.module.js';

import { GLTFLoader } from 'https://unpkg.com/three@0.166.1/examples/jsm/loaders/GLTFLoader.js';

import { OrbitControls } from 'https://unpkg.com/three@0.166.1/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1.5,3);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light1 = new THREE.DirectionalLight(0xffffff,2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.AmbientLight(0xffffff,1);
scene.add(light2);

const controls = new OrbitControls(camera,renderer.domElement);

controls.enableDamping=true;
controls.enablePan=false;

const loader = new GLTFLoader();

loader.load(
'avatar.glb',

function(gltf){

const avatar = gltf.scene;

avatar.position.set(0,-1,0);

scene.add(avatar);

},

undefined,

function(error){
console.log(error);
}
);

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
